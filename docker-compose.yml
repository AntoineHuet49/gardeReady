services:
  frontend:
    build:
      context: ./Sources/client
    container_name: gardeReady-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Sources/client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./Sources/api
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./Sources/api:/app
      - /app/node_modules
    env_file:
      - ./Sources/api/.env.local
    environment:
      - NODE_ENV=development

  database:
    image: postgres:latest
    container_name: gardeReady-database
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gardeready
    ports:
      - "5432:5432"
    volumes:
      - ./Sources/database/initdb:/docker-entrypoint-initdb.d/

volumes:
  db_data:
